services:
  postgres:
    image: postgres:16
    container_name: career-log-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - career_log_data:/var/lib/postgresql/data

volumes:
  career_log_data: